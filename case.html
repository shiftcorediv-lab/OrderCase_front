<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OrderCase 案件詳細</title>

  <link rel="stylesheet" href="./css/common.css" />

  <style>
    /****************************************************
     * case.html 専用スタイル
     ****************************************************/
    main {
      padding-bottom: 40px;
    }

    .actions {
      margin-bottom: 16px;
    }

    .detail-head {
      margin-bottom: 14px;
    }

    .case-id {
      font-size: 18px;
      margin-bottom: 4px;
    }

    .case-title {
      color: #555;
    }
  </style>
</head>

<body>
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-box">
      <div class="spinner"></div>
      <div class="loading-text" id="loadingText">読み込み中...</div>
    </div>
  </div>

  <header id="ordercaseHeader"></header>

  <main>
    <div class="actions">
      <a class="button-link secondary" href="./cases.html">案件一覧へ戻る</a>
    </div>

    <div class="message" id="messageBox">読み込み中...</div>
    <div id="detailRoot"></div>
  </main>

  <script src="./js/config.js"></script>
  <script src="./js/utils.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/loading.js"></script>
  <script src="./js/navigation.js"></script>

  <script>
    /****************************************************
     * 状態 ここから
     ****************************************************/
    const state = {
      caseDetail: null
    };
    /****************************************************
     * 状態 ここまで
     ****************************************************/


    /****************************************************
     * 初期化 ここから
     ****************************************************/
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        renderOrderCaseHeader('', '案件詳細');
        await loadCaseDetail();

      } catch (error) {
        console.error(error);
        setMessage('読み込みエラー: ' + error.message, 'error');
        renderEmpty('案件詳細を表示できませんでした。');
      }
    });
    /****************************************************
     * 初期化 ここまで
     ****************************************************/


    /****************************************************
     * loadCaseDetail ここから
     * URLの case_id を元に案件詳細を取得
     ****************************************************/
    async function loadCaseDetail() {
      const caseId = getQueryParam('case_id');

      if (!caseId) {
        throw new Error('case_id がURLに指定されていません。');
      }

      setMessage('案件詳細を読み込み中...', '');
      showLoading('案件詳細を読み込み中...');

      try {
        const json = await fetchApiJsonWithParams('getCaseDetail', {
          case_id: caseId
        });

        if (!json.ok) {
          throw new Error(json.message || '案件詳細の取得に失敗しました');
        }

        state.caseDetail = json.data;

        renderCaseDetail();
        setMessage('案件詳細を読み込みました', '');

      } finally {
        hideLoading();
      }
    }
    /****************************************************
     * loadCaseDetail ここまで
     ****************************************************/


    /****************************************************
     * renderCaseDetail ここから
     * 案件詳細を描画
     ****************************************************/
    function renderCaseDetail() {
      const root = document.getElementById('detailRoot');
      const item = state.caseDetail;

      if (!item) {
        renderEmpty('案件が見つかりません。');
        return;
      }

      const statusName = getStatusName(item.status);
      const caseTypeName = getCaseTypeName(item.case_type);
      const scheduleText = getScheduleText(item);

      root.innerHTML = `
        <section class="detail-card">
          <div class="detail-head">
            <div>
              <div class="case-id">${escapeHtml(item.case_id)}</div>
              <div class="case-title">${escapeHtml(caseTypeName)} / ${escapeHtml(item.store_name || '-')}</div>
            </div>
            <div class="status ${escapeHtml(item.status || '')}">${escapeHtml(statusName)}</div>
          </div>

          <div class="grid three">
            ${fieldHtml('対象月', item.target_month)}
            ${fieldHtml('案件種別', caseTypeName)}
            ${fieldHtml('ステータス', statusName)}
            ${fieldHtml('入力方式', item.input_mode === 'days' ? '日数指定' : '日付指定')}
            ${fieldHtml('日付/日数', scheduleText)}
            ${fieldHtml('返答期限', item.reply_deadline)}
          </div>
        </section>

        <section class="detail-card">
          <h2 class="section-title">代理店・連携店舗</h2>
          <div class="grid two">
            ${fieldHtml('代理店', item.agency_name)}
            ${fieldHtml('連携店舗', item.store_name)}
            ${fieldHtml('連携店舗エリア', item.store_area)}
            ${fieldHtml('代理店ID / 店舗ID', `${item.agency_id || '-'} / ${item.store_id || '-'}`)}
          </div>
        </section>

        <section class="detail-card">
          <h2 class="section-title">稼働条件</h2>
          <div class="grid two">
            ${fieldHtml('実稼働場所', item.work_location)}
            ${fieldHtml('実稼働エリア', item.work_area)}
            ${fieldHtml('稼働開始時間', item.work_start_time)}
            ${fieldHtml('稼働終了時間', item.work_end_time)}
            ${fieldHtml('集合時間', item.meeting_time)}
            ${fieldHtml('集合場所', item.meeting_place)}
            ${fieldHtml('必要スキル', getSkillName(item.required_skill))}
          </div>
        </section>

        <section class="detail-card">
          <h2 class="section-title">必要数</h2>
          <div class="grid three">
            ${fieldHtml('必要枠数', item.required_lines)}
            ${fieldHtml('1枠あたり人数', item.people_per_line)}
            ${fieldHtml('必要人数', item.required_people)}
          </div>
        </section>

        <section class="detail-card">
          <h2 class="section-title">日付明細</h2>
          ${renderCaseDates(item)}
        </section>

        <section class="detail-card">
          <h2 class="section-title">金額</h2>
          <div class="grid two">
            ${fieldHtml('金額', formatAmount(item.amount))}
            ${fieldHtml('金額区分', getAmountTypeName(item.amount_type))}
            ${fieldHtml('税区分', getTaxTypeName(item.tax_type))}
            ${fieldHtml('金額メモ', item.amount_memo)}
          </div>
        </section>

        <section class="detail-card">
          <h2 class="section-title">メモ</h2>
          <div class="grid">
            ${memoHtml('先方メモ', item.client_memo)}
            ${memoHtml('社内メモ', item.internal_memo)}
            ${memoHtml('運用メモ', item.operation_memo)}
          </div>
        </section>

        <section class="detail-card">
          <h2 class="section-title">管理情報</h2>
          <div class="grid two">
            ${fieldHtml('ShiftBuilder対象', formatBoolean(item.for_shift_builder))}
            ${fieldHtml('アーカイブ', formatBoolean(item.archived))}
            ${fieldHtml('登録者', item.created_by)}
            ${fieldHtml('登録日時', item.created_at)}
            ${fieldHtml('更新者', item.updated_by)}
            ${fieldHtml('更新日時', item.updated_at)}
          </div>
        </section>
      `;
    }
    /****************************************************
     * renderCaseDetail ここまで
     ****************************************************/


    /****************************************************
     * renderCaseDates ここから
     * 日付明細を表示
     ****************************************************/
    function renderCaseDates(item) {
      if (item.input_mode === 'days') {
        return `
          <div class="grid two">
            ${fieldHtml('希望日数', item.requested_days ? `${item.requested_days}日分` : '-')}
            ${fieldHtml('割当状況', getAllocationStatusName(item.allocation_status))}
          </div>
        `;
      }

      const dates = Array.isArray(item.case_dates) ? item.case_dates : [];

      if (dates.length === 0) {
        return '<div class="empty">日付明細はありません。</div>';
      }

      const rows = dates.map(date => {
        return `
          <div class="date-item">
            <div class="date-main">${escapeHtml(date.work_date || '-')}</div>
            <div class="date-sub">必要枠数：${escapeHtml(date.required_lines || '-')} / 1枠あたり人数：${escapeHtml(date.people_per_line || '-')} / 必要人数：${escapeHtml(date.required_people || '-')}</div>
            <div class="date-sub">メモ：${escapeHtml(date.memo || '-')}</div>
          </div>
        `;
      }).join('');

      return `<div class="date-list">${rows}</div>`;
    }
    /****************************************************
     * renderCaseDates ここまで
     ****************************************************/


    /****************************************************
     * HTML部品 ここから
     ****************************************************/
    function fieldHtml(label, value) {
      return `
        <div class="field">
          <div class="label">${escapeHtml(label)}</div>
          <div class="value">${escapeHtml(displayValue(value))}</div>
        </div>
      `;
    }

    function memoHtml(label, value) {
      return `
        <div>
          <div class="label">${escapeHtml(label)}</div>
          <div class="memo-box">${escapeHtml(displayValue(value))}</div>
        </div>
      `;
    }

    function renderEmpty(text) {
      const root = document.getElementById('detailRoot');
      root.innerHTML = `<div class="empty">${escapeHtml(text)}</div>`;
    }
    /****************************************************
     * HTML部品 ここまで
     ****************************************************/


    /****************************************************
     * 小物関数 ここから
     ****************************************************/
    function setMessage(text, type) {
      const box = document.getElementById('messageBox');
      box.textContent = text;
      box.className = `message ${type || ''}`;
    }
    /****************************************************
     * 小物関数 ここまで
     ****************************************************/
  </script>
</body>
</html>
