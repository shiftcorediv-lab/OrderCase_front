<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OrderCase 案件一覧</title>

  <link rel="stylesheet" href="./css/common.css" />

  <style>
    /****************************************************
     * cases.html 専用スタイル
     ****************************************************/
    .toolbar {
      display: grid;
      gap: 10px;
    }

    @media (min-width: 860px) {
      .toolbar {
        grid-template-columns: 1fr 150px 150px 150px auto;
        align-items: end;
      }
    }

    .case-list {
      display: grid;
      gap: 12px;
    }

    .card-actions {
      justify-content: flex-end;
    }
  </style>
</head>

<body>
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-box">
      <div class="spinner"></div>
      <div class="loading-text" id="loadingText">読み込み中...</div>
    </div>
  </div>

  <header id="ordercaseHeader"></header>

  <main>
    <div class="toolbar">
      <div>
        <label for="keyword">キーワード</label>
        <input id="keyword" placeholder="案件ID・代理店・店舗・場所で検索" />
      </div>

      <div>
        <label for="targetMonthFilter">対象月</label>
        <input id="targetMonthFilter" type="month" />
      </div>

      <div>
        <label for="statusFilter">ステータス</label>
        <select id="statusFilter">
          <option value="">すべて</option>
          <option value="received">受付済み</option>
          <option value="checking">確認中</option>
          <option value="confirmed">確定</option>
          <option value="cancelled">キャンセル</option>
          <option value="archived">アーカイブ</option>
        </select>
      </div>

      <div>
        <label for="caseTypeFilter">案件種別</label>
        <select id="caseTypeFilter">
          <option value="">すべて</option>
        </select>
      </div>

      <button type="button" id="reloadButton">再読み込み</button>
    </div>

    <div class="message" id="messageBox">読み込み中...</div>
    <div class="case-list" id="caseList"></div>
  </main>

  <script src="./js/config.js"></script>
  <script src="./js/utils.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/loading.js"></script>
  <script src="./js/navigation.js"></script>

  <script>
    /****************************************************
     * 状態 ここから
     ****************************************************/
    const state = {
      cases: [],
      caseTypes: []
    };

    let searchTimer = null;
    /****************************************************
     * 状態 ここまで
     ****************************************************/


    /****************************************************
     * 初期化 ここから
     ****************************************************/
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        renderOrderCaseHeader('cases', '案件一覧');
        setupEventListeners();
        await loadListPageData();

      } catch (error) {
        console.error(error);
        setMessage('読み込みエラー: ' + error.message, 'error');
      }
    });
    /****************************************************
     * 初期化 ここまで
     ****************************************************/


    /****************************************************
     * setupEventListeners ここから
     ****************************************************/
    function setupEventListeners() {
      document.getElementById('reloadButton').addEventListener('click', loadListPageData);

      document.getElementById('keyword').addEventListener('input', debounceLoadListPageData);
      document.getElementById('targetMonthFilter').addEventListener('change', loadListPageData);
      document.getElementById('statusFilter').addEventListener('change', loadListPageData);
      document.getElementById('caseTypeFilter').addEventListener('change', loadListPageData);
    }
    /****************************************************
     * setupEventListeners ここまで
     ****************************************************/


    /****************************************************
     * loadListPageData ここから
     * 一覧画面に必要なデータをまとめて取得
     ****************************************************/
    async function loadListPageData() {
      setMessage('案件一覧を読み込み中...', '');
      showLoading('案件一覧を読み込み中...');

      const button = document.getElementById('reloadButton');
      button.disabled = true;
      button.textContent = '読込中...';

      try {
        const json = await fetchApiJsonWithParams('listPageData', getListFilters());

        if (!json.ok) {
          throw new Error(json.message || '一覧データ取得に失敗しました');
        }

        state.caseTypes = json.data.case_types || [];
        state.cases = json.data.cases || [];

        renderCaseTypeFilter();
        renderCases();

        setMessage(`${state.cases.length}件の案件を読み込みました`, '');

      } finally {
        button.disabled = false;
        button.textContent = '再読み込み';
        hideLoading();
      }
    }
    /****************************************************
     * loadListPageData ここまで
     ****************************************************/


    /****************************************************
     * renderCaseTypeFilter ここから
     ****************************************************/
    function renderCaseTypeFilter() {
      const select = document.getElementById('caseTypeFilter');
      const currentValue = select.value;

      select.innerHTML = '<option value="">すべて</option>';

      state.caseTypes.forEach(type => {
        const option = document.createElement('option');
        option.value = type.case_type_id;
        option.textContent = type.case_type_name;
        select.appendChild(option);
      });

      select.value = currentValue;
    }
    /****************************************************
     * renderCaseTypeFilter ここまで
     ****************************************************/


    /****************************************************
     * renderCases ここから
     ****************************************************/
    function renderCases() {
      const list = document.getElementById('caseList');
      list.innerHTML = '';

      if (state.cases.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = '該当する案件はありません。';
        list.appendChild(empty);
        return;
      }

      state.cases.forEach(item => {
        list.appendChild(createCaseCard(item));
      });
    }
    /****************************************************
     * renderCases ここまで
     ****************************************************/


    /****************************************************
     * createCaseCard ここから
     ****************************************************/
    function createCaseCard(item) {
      const card = document.createElement('article');
      card.className = 'case-card';

      const caseTypeName = getCaseTypeName(item.case_type, state.caseTypes);
      const statusName = getStatusName(item.status);
      const scheduleText = getScheduleText(item);
      const detailUrl = `./case.html?case_id=${encodeURIComponent(item.case_id)}`;

      card.innerHTML = `
        <div class="case-head">
          <div>
            <div class="case-id">${escapeHtml(item.case_id)}</div>
            <div class="case-title">${escapeHtml(caseTypeName)} / ${escapeHtml(item.store_name || '-')}</div>
          </div>
          <div class="status ${escapeHtml(item.status || '')}">${escapeHtml(statusName)}</div>
        </div>

        <div class="meta">
          <div><strong>対象月：</strong>${escapeHtml(item.target_month || '-')}</div>
          <div><strong>入力方式：</strong>${item.input_mode === 'days' ? '日数指定' : '日付指定'}</div>
          <div><strong>日付/日数：</strong>${escapeHtml(scheduleText)}</div>

          <div><strong>代理店：</strong>${escapeHtml(item.agency_name || '-')}</div>
          <div><strong>連携店舗エリア：</strong>${escapeHtml(item.store_area || '-')}</div>

          <div><strong>実稼働場所：</strong>${escapeHtml(item.work_location || '-')}</div>
          <div><strong>実稼働エリア：</strong>${escapeHtml(item.work_area || '-')}</div>

          <div><strong>必要枠数：</strong>${escapeHtml(item.required_lines || '-')}</div>
          <div><strong>必要人数：</strong>${escapeHtml(item.required_people || '-')}</div>

          <div><strong>ステータス：</strong>${escapeHtml(statusName)}</div>
          <div><strong>登録日時：</strong>${escapeHtml(item.created_at || '-')}</div>
        </div>

        ${renderMemo(item)}

        <div class="card-actions">
          <a class="detail-link" href="${detailUrl}">詳細を見る</a>
        </div>
      `;

      return card;
    }
    /****************************************************
     * createCaseCard ここまで
     ****************************************************/


    /****************************************************
     * renderMemo ここから
     ****************************************************/
    function renderMemo(item) {
      const memos = [];

      if (item.client_memo) memos.push('先方メモ：' + item.client_memo);
      if (item.internal_memo) memos.push('社内メモ：' + item.internal_memo);
      if (item.operation_memo) memos.push('運用メモ：' + item.operation_memo);

      if (memos.length === 0) {
        return '';
      }

      return `<div class="memo">${escapeHtml(memos.join('\n'))}</div>`;
    }
    /****************************************************
     * renderMemo ここまで
     ****************************************************/


    /****************************************************
     * API・検索条件 ここから
     ****************************************************/
    function getListFilters() {
      return {
        keyword: document.getElementById('keyword').value.trim(),
        target_month: document.getElementById('targetMonthFilter').value,
        status: document.getElementById('statusFilter').value,
        case_type: document.getElementById('caseTypeFilter').value
      };
    }

    function debounceLoadListPageData() {
      clearTimeout(searchTimer);

      searchTimer = setTimeout(() => {
        loadListPageData();
      }, 500);
    }
    /****************************************************
     * API・検索条件 ここまで
     ****************************************************/


    /****************************************************
     * 小物関数 ここから
     ****************************************************/
    function setMessage(text, type) {
      const box = document.getElementById('messageBox');
      box.textContent = text;
      box.className = `message ${type || ''}`;
    }
    /****************************************************
     * 小物関数 ここまで
     ****************************************************/
  </script>
</body>
</html>
