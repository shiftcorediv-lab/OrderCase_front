<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OrderCase 案件一覧</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f6f8;
      color: #222;
    }

    header {
      background: #202124;
      color: white;
      padding: 18px 16px;
    }

    header h1 {
      margin: 0;
      font-size: 22px;
    }

    header p {
      margin: 6px 0 0;
      font-size: 13px;
      color: #cfd3d7;
    }

    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 16px;
    }

    .top-nav {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .nav-link {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      color: #cfd3d7;
      text-decoration: none;
      font-size: 13px;
      font-weight: 800;
      border: 1px solid rgba(255,255,255,0.25);
    }

    .nav-link.active {
      background: white;
      color: #202124;
    }

    .nav-link:hover {
      text-decoration: none;
      background: rgba(255,255,255,0.14);
    }

    .toolbar {
      background: white;
      border-radius: 18px;
      padding: 14px;
      margin-bottom: 16px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.06);
      display: grid;
      gap: 10px;
    }

    @media (min-width: 720px) {
      .toolbar {
        grid-template-columns: 1fr 180px 180px auto;
        align-items: end;
      }
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 6px;
      color: #344054;
    }

    input,
    select {
      width: 100%;
      border: 1px solid #d0d5dd;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 14px;
      background: white;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 11px 14px;
      font-weight: 800;
      background: #202124;
      color: white;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .message {
      font-size: 13px;
      color: #667085;
      margin-bottom: 12px;
    }

    .error {
      color: #b42318;
      font-weight: 700;
    }

    .case-list {
      display: grid;
      gap: 12px;
    }

    .case-card {
      background: white;
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.06);
      border: 1px solid #edf0f3;
    }

    .case-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .case-id {
      font-weight: 900;
      font-size: 15px;
    }

    .case-title {
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .status {
      font-size: 12px;
      font-weight: 800;
      padding: 5px 9px;
      border-radius: 999px;
      background: #eef2ff;
      color: #3538cd;
      white-space: nowrap;
    }

    .status.checking {
      background: #fff6ed;
      color: #c4320a;
    }

    .status.confirmed {
      background: #ecfdf3;
      color: #027a48;
    }

    .status.cancelled {
      background: #fef3f2;
      color: #b42318;
    }

    .status.archived {
      background: #f2f4f7;
      color: #475467;
    }

    .meta {
      display: grid;
      gap: 6px;
      font-size: 13px;
      color: #475467;
      line-height: 1.5;
    }

    @media (min-width: 720px) {
      .meta {
        grid-template-columns: 1fr 1fr;
      }
    }

    .memo {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #edf0f3;
      font-size: 13px;
      color: #475467;
      white-space: pre-wrap;
    }

    .empty {
      background: white;
      border-radius: 18px;
      padding: 24px;
      text-align: center;
      color: #667085;
      box-shadow: 0 4px 14px rgba(0,0,0,0.06);
    }
  </style>
</head>

<body>
  <header>
    <h1>OrderCase</h1>
    <p>案件一覧</p>

    <nav class="top-nav">
      <a class="nav-link" href="./index.html">案件登録</a>
      <a class="nav-link active" href="./cases.html">案件一覧</a>
    </nav>
  </header>

  <main>
    <div class="toolbar">
      <div>
        <label for="keyword">キーワード</label>
        <input id="keyword" placeholder="案件ID・代理店・店舗・場所で検索" />
      </div>

      <div>
        <label for="statusFilter">ステータス</label>
        <select id="statusFilter">
          <option value="">すべて</option>
          <option value="received">受付済み</option>
          <option value="checking">確認中</option>
          <option value="confirmed">確定</option>
          <option value="cancelled">キャンセル</option>
          <option value="archived">アーカイブ</option>
        </select>
      </div>

      <div>
        <label for="caseTypeFilter">案件種別</label>
        <select id="caseTypeFilter">
          <option value="">すべて</option>
        </select>
      </div>

      <button type="button" id="reloadButton">再読み込み</button>
    </div>

    <div class="message" id="messageBox">読み込み中...</div>
    <div class="case-list" id="caseList"></div>
  </main>

  <script>
    /****************************************************
     * 設定 ここから
     ****************************************************/
    window.ORDERCASE_API_URL = 'https://ordercaseapiproxyworker.shiftcore-div.workers.dev';
    /****************************************************
     * 設定 ここまで
     ****************************************************/


    /****************************************************
     * 状態 ここから
     ****************************************************/
    const state = {
      cases: [],
      caseTypes: [],
      settings: {}
    };
    /****************************************************
     * 状態 ここまで
     ****************************************************/


    /****************************************************
     * 初期化 ここから
     ****************************************************/
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        setupEventListeners();
        await loadListPageData();

      } catch (error) {
        console.error(error);
        setMessage('読み込みエラー: ' + error.message, 'error');
      }
    });
    /****************************************************
     * 初期化 ここまで
     ****************************************************/


    /****************************************************
     * setupEventListeners ここから
     ****************************************************/
    function setupEventListeners() {
      document.getElementById('reloadButton').addEventListener('click', loadListPageData);
      document.getElementById('keyword').addEventListener('input', renderCases);
      document.getElementById('statusFilter').addEventListener('change', renderCases);
      document.getElementById('caseTypeFilter').addEventListener('change', renderCases);
    }
    /****************************************************
     * setupEventListeners ここまで
     ****************************************************/


    /****************************************************
     * loadListPageData ここから
     * 一覧画面に必要なデータをまとめて取得
     ****************************************************/
    async function loadListPageData() {
      setMessage('案件一覧を読み込み中...', '');

      const button = document.getElementById('reloadButton');
      button.disabled = true;
      button.textContent = '読込中...';

      try {
        const json = await fetchApiJson('listPageData');

        if (!json.ok) {
          throw new Error(json.message || '一覧データ取得に失敗しました');
        }

        state.caseTypes = json.data.case_types || [];
        state.cases = json.data.cases || [];

        renderCaseTypeFilter();
        renderCases();

        setMessage(`${state.cases.length}件の案件を読み込みました`, '');

      } finally {
        button.disabled = false;
        button.textContent = '再読み込み';
      }
    }
    /****************************************************
     * loadListPageData ここまで
     ****************************************************/


    /****************************************************
     * renderCaseTypeFilter ここから
     ****************************************************/
    function renderCaseTypeFilter() {
      const select = document.getElementById('caseTypeFilter');
      const currentValue = select.value;

      select.innerHTML = '<option value="">すべて</option>';

      state.caseTypes.forEach(type => {
        const option = document.createElement('option');
        option.value = type.case_type_id;
        option.textContent = type.case_type_name;
        select.appendChild(option);
      });

      select.value = currentValue;
    }
    /****************************************************
     * renderCaseTypeFilter ここまで
     ****************************************************/


    /****************************************************
     * renderCases ここから
     ****************************************************/
    function renderCases() {
      const list = document.getElementById('caseList');
      list.innerHTML = '';

      const filtered = getFilteredCases();

      if (filtered.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = '該当する案件はありません。';
        list.appendChild(empty);
        return;
      }

      filtered.forEach(item => {
        list.appendChild(createCaseCard(item));
      });
    }
    /****************************************************
     * renderCases ここまで
     ****************************************************/


    /****************************************************
     * getFilteredCases ここから
     ****************************************************/
    function getFilteredCases() {
      const keyword = document.getElementById('keyword').value.trim().toLowerCase();
      const status = document.getElementById('statusFilter').value;
      const caseType = document.getElementById('caseTypeFilter').value;

      return state.cases
        .filter(item => {
          if (status && item.status !== status) return false;
          if (caseType && item.case_type !== caseType) return false;

          if (!keyword) return true;

          const target = [
            item.case_id,
            item.target_month,
            item.agency_name,
            item.store_name,
            item.store_area,
            item.work_location,
            item.work_area,
            item.client_memo,
            item.internal_memo,
            item.operation_memo,
            getScheduleText(item)
          ].join(' ').toLowerCase();

          return target.includes(keyword);
        })
        .sort((a, b) => {
          const aDate = String(a.created_at || '');
          const bDate = String(b.created_at || '');
          return bDate.localeCompare(aDate);
        });
    }
    /****************************************************
     * getFilteredCases ここまで
     ****************************************************/


    /****************************************************
     * createCaseCard ここから
     ****************************************************/
    function createCaseCard(item) {
      const card = document.createElement('article');
      card.className = 'case-card';

      const caseTypeName = getCaseTypeName(item.case_type);
      const statusName = getStatusName(item.status);
      const scheduleText = getScheduleText(item);

      card.innerHTML = `
        <div class="case-head">
          <div>
            <div class="case-id">${escapeHtml(item.case_id)}</div>
            <div class="case-title">${escapeHtml(caseTypeName)} / ${escapeHtml(item.store_name || '-')}</div>
          </div>
          <div class="status ${escapeHtml(item.status || '')}">${escapeHtml(statusName)}</div>
        </div>

        <div class="meta">
          <div><strong>対象月：</strong>${escapeHtml(item.target_month || '-')}</div>
          <div><strong>入力方式：</strong>${item.input_mode === 'days' ? '日数指定' : '日付指定'}</div>
          <div><strong>日付/日数：</strong>${escapeHtml(scheduleText)}</div>

          <div><strong>代理店：</strong>${escapeHtml(item.agency_name || '-')}</div>
          <div><strong>連携店舗エリア：</strong>${escapeHtml(item.store_area || '-')}</div>

          <div><strong>実稼働場所：</strong>${escapeHtml(item.work_location || '-')}</div>
          <div><strong>実稼働エリア：</strong>${escapeHtml(item.work_area || '-')}</div>

          <div><strong>必要枠数：</strong>${escapeHtml(item.required_lines || '-')}</div>
          <div><strong>必要人数：</strong>${escapeHtml(item.required_people || '-')}</div>

          <div><strong>ステータス：</strong>${escapeHtml(statusName)}</div>
          <div><strong>登録日時：</strong>${escapeHtml(item.created_at || '-')}</div>
        </div>

        ${renderMemo(item)}
      `;

      return card;
    }
    /****************************************************
     * createCaseCard ここまで
     ****************************************************/


    /****************************************************
     * renderMemo ここから
     ****************************************************/
    function renderMemo(item) {
      const memos = [];

      if (item.client_memo) memos.push('先方メモ：' + item.client_memo);
      if (item.internal_memo) memos.push('社内メモ：' + item.internal_memo);
      if (item.operation_memo) memos.push('運用メモ：' + item.operation_memo);

      if (memos.length === 0) return '';

      return `<div class="memo">${escapeHtml(memos.join('\n'))}</div>`;
    }
    /****************************************************
     * renderMemo ここまで
     ****************************************************/


    /****************************************************
     * getScheduleText ここから
     * 一覧表示用に日付指定 / 日数指定の内容を整形
     ****************************************************/
    function getScheduleText(item) {
      if (item.input_mode === 'days') {
        return item.requested_days
          ? `${item.requested_days}日分`
          : '-';
      }

      if (item.input_mode === 'dates') {
        const dates = Array.isArray(item.case_dates) ? item.case_dates : [];

        if (dates.length === 0) {
          return '-';
        }

        return dates
          .map(date => {
            const people = date.required_people ? ` / ${date.required_people}人` : '';
            return `${date.work_date}${people}`;
          })
          .join('、');
      }

      return '-';
    }
    /****************************************************
     * getScheduleText ここまで
     ****************************************************/


    /****************************************************
     * 表示名変換 ここから
     ****************************************************/
    function getCaseTypeName(value) {
      const found = state.caseTypes.find(type => type.case_type_id === value);
      return found ? found.case_type_name : value;
    }

    function getStatusName(value) {
      const map = {
        received: '受付済み',
        checking: '確認中',
        confirmed: '確定',
        cancelled: 'キャンセル',
        archived: 'アーカイブ'
      };

      return map[value] || value || '-';
    }
    /****************************************************
     * 表示名変換 ここまで
     ****************************************************/


    /****************************************************
     * API共通 ここから
     ****************************************************/
    function buildApiUrl(action) {
      const base = window.ORDERCASE_API_URL;

      if (!base || !base.startsWith('https://')) {
        throw new Error('API URLが不正です: ' + base);
      }

      const url = new URL(base);
      url.searchParams.set('action', action);
      return url.toString();
    }

    async function fetchApiJson(action, options = {}) {
      const url = action ? buildApiUrl(action) : window.ORDERCASE_API_URL;

      const res = await fetch(url, options);
      const text = await res.text();

      let json;

      try {
        json = JSON.parse(text);
      } catch (error) {
        throw new Error('APIの返答がJSONではありません: ' + text.slice(0, 120));
      }

      return json;
    }
    /****************************************************
     * API共通 ここまで
     ****************************************************/


    /****************************************************
     * 小物関数 ここから
     ****************************************************/
    function setMessage(text, type) {
      const box = document.getElementById('messageBox');
      box.textContent = text;
      box.className = `message ${type || ''}`;
    }

    function escapeHtml(text) {
      return String(text ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }
    /****************************************************
     * 小物関数 ここまで
     ****************************************************/
  </script>
</body>
</html>
