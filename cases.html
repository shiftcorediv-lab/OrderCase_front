<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OrderCase 案件一覧</title>

  <link rel="stylesheet" href="./css/common.css" />

  <style>
    /****************************************************
     * cases.html 専用スタイル
     ****************************************************/
    .toolbar {
      display: grid;
      gap: 10px;
    }

    @media (min-width: 860px) {
      .toolbar {
        grid-template-columns: 1fr 150px 150px 150px auto;
        align-items: end;
      }
    }

    .case-list {
      display: grid;
      gap: 12px;
    }

    .case-card {
      padding: 18px;
      position: relative;
    }

    .case-top-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
    }

    .created-at {
      font-size: 12px;
      color: #777;
      font-weight: bold;
      line-height: 1.5;
    }

    .case-main-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .case-main-title {
      font-size: 20px;
      font-weight: bold;
      color: #333;
      line-height: 1.35;
    }

    .target-month-badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: #f0fff4;
      border: 1px solid #b7ebc6;
      color: #2e7d32;
      font-size: 13px;
      font-weight: bold;
      white-space: nowrap;
    }

    .overview-meta {
      display: grid;
      gap: 8px;
      font-size: 14px;
      color: #555;
      line-height: 1.6;
      margin-top: 12px;
    }

    @media (min-width: 720px) {
      .overview-meta {
        grid-template-columns: 1fr 1fr;
      }
    }

    .overview-item {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 10px 12px;
    }

    .overview-item.important {
      background: #f0fff4;
      border-color: #b7ebc6;
    }

    .overview-label {
      display: block;
      font-size: 12px;
      font-weight: bold;
      color: #666;
      margin-bottom: 3px;
    }

    .overview-value {
      display: block;
      font-size: 14px;
      font-weight: bold;
      color: #333;
      word-break: break-word;
    }

    .card-actions {
      justify-content: space-between;
      align-items: end;
    }

    .case-id-small {
      font-size: 11px;
      color: #888;
      font-weight: bold;
      text-align: right;
      margin-left: auto;
      word-break: break-all;
    }

    .detail-link {
      min-width: 120px;
    }

    @media (max-width: 480px) {
      .case-main-title {
        font-size: 18px;
      }

      .card-actions {
        flex-direction: column;
        align-items: stretch;
      }

      .case-id-small {
        text-align: right;
      }
    }
  </style>
</head>

<body>
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-box">
      <div class="spinner"></div>
      <div class="loading-text" id="loadingText">読み込み中...</div>
    </div>
  </div>

  <header id="ordercaseHeader"></header>

  <main>
    <div class="toolbar">
      <div>
        <label for="keyword">キーワード</label>
        <input id="keyword" placeholder="案件ID・代理店・店舗・場所で検索" />
      </div>

      <div>
        <label for="targetMonthFilter">対象月</label>
        <input id="targetMonthFilter" type="month" />
      </div>

      <div>
        <label for="statusFilter">ステータス</label>
        <select id="statusFilter">
          <option value="">すべて</option>
          <option value="received">受付済み</option>
          <option value="checking">確認中</option>
          <option value="confirmed">確定</option>
          <option value="cancelled">キャンセル</option>
          <option value="archived">アーカイブ</option>
        </select>
      </div>

      <div>
        <label for="caseTypeFilter">案件種別</label>
        <select id="caseTypeFilter">
          <option value="">すべて</option>
        </select>
      </div>

      <button type="button" id="reloadButton">再読み込み</button>
    </div>

    <div class="message" id="messageBox">読み込み中...</div>
    <div class="case-list" id="caseList"></div>
  </main>

  <script src="./js/config.js"></script>
  <script src="./js/utils.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/loading.js"></script>
  <script src="./js/navigation.js"></script>

  <script>
    /****************************************************
     * 状態 ここから
     ****************************************************/
    const state = {
      cases: [],
      caseTypes: []
    };

    let searchTimer = null;
    /****************************************************
     * 状態 ここまで
     ****************************************************/


    /****************************************************
     * 初期化 ここから
     ****************************************************/
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        renderOrderCaseHeader('cases', '案件一覧');
        setupEventListeners();
        await loadListPageData();

      } catch (error) {
        console.error(error);
        setMessage('読み込みエラー: ' + error.message, 'error');
      }
    });
    /****************************************************
     * 初期化 ここまで
     ****************************************************/


    /****************************************************
     * setupEventListeners ここから
     ****************************************************/
    function setupEventListeners() {
      document.getElementById('reloadButton').addEventListener('click', loadListPageData);

      document.getElementById('keyword').addEventListener('input', debounceLoadListPageData);
      document.getElementById('targetMonthFilter').addEventListener('change', loadListPageData);
      document.getElementById('statusFilter').addEventListener('change', loadListPageData);
      document.getElementById('caseTypeFilter').addEventListener('change', loadListPageData);
    }
    /****************************************************
     * setupEventListeners ここまで
     ****************************************************/


    /****************************************************
     * loadListPageData ここから
     * 一覧画面に必要なデータをまとめて取得
     ****************************************************/
    async function loadListPageData() {
      setMessage('案件一覧を読み込み中...', '');
      showLoading('案件一覧を読み込み中...');

      const button = document.getElementById('reloadButton');
      button.disabled = true;
      button.textContent = '読込中...';

      try {
        const json = await fetchApiJsonWithParams('listPageData', getListFilters());

        if (!json.ok) {
          throw new Error(json.message || '一覧データ取得に失敗しました');
        }

        state.caseTypes = json.data.case_types || [];
        state.cases = json.data.cases || [];

        renderCaseTypeFilter();
        renderCases();

        setMessage(`${state.cases.length}件の案件を読み込みました`, '');

      } finally {
        button.disabled = false;
        button.textContent = '再読み込み';
        hideLoading();
      }
    }
    /****************************************************
     * loadListPageData ここまで
     ****************************************************/


    /****************************************************
     * renderCaseTypeFilter ここから
     ****************************************************/
    function renderCaseTypeFilter() {
      const select = document.getElementById('caseTypeFilter');
      const currentValue = select.value;

      select.innerHTML = '<option value="">すべて</option>';

      state.caseTypes.forEach(type => {
        const option = document.createElement('option');
        option.value = type.case_type_id;
        option.textContent = type.case_type_name;
        select.appendChild(option);
      });

      select.value = currentValue;
    }
    /****************************************************
     * renderCaseTypeFilter ここまで
     ****************************************************/


    /****************************************************
     * renderCases ここから
     ****************************************************/
    function renderCases() {
      const list = document.getElementById('caseList');
      list.innerHTML = '';

      if (state.cases.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = '該当する案件はありません。';
        list.appendChild(empty);
        return;
      }

      state.cases.forEach(item => {
        list.appendChild(createCaseCard(item));
      });
    }
    /****************************************************
     * renderCases ここまで
     ****************************************************/


    /****************************************************
     * createCaseCard ここから
     * 一覧カードは概要だけ表示する
     ****************************************************/
    function createCaseCard(item) {
      const card = document.createElement('article');
      card.className = 'case-card';

      const caseTypeName = getCaseTypeName(item.case_type, state.caseTypes);
      const statusName = getStatusName(item.status);
      const detailUrl = `./case.html?case_id=${encodeURIComponent(item.case_id)}`;

      const isRetailStore = item.case_type === 'retail_store';

      card.innerHTML = `
        <div class="case-top-row">
          <div class="created-at">${escapeHtml(formatCreatedAt(item.created_at))}</div>
          <div class="status ${escapeHtml(item.status || '')}">${escapeHtml(statusName)}</div>
        </div>

        <div class="case-main-row">
          <div class="case-main-title">${escapeHtml(caseTypeName)} / ${escapeHtml(item.store_name || '-')}</div>
          <div class="target-month-badge">${escapeHtml(item.target_month || '-')}</div>
        </div>

        <div class="overview-meta">
          ${overviewItemHtml('必要人数', item.required_people ? `${item.required_people}人` : '-', true)}
          ${renderOptionalOverviewItems(item, isRetailStore)}
        </div>

        <div class="card-actions">
          <a class="detail-link" href="${detailUrl}">詳細を見る</a>
          <div class="case-id-small">${escapeHtml(item.case_id || '-')}</div>
        </div>
      `;

      return card;
    }
    /****************************************************
     * createCaseCard ここまで
     ****************************************************/


    /****************************************************
     * renderOptionalOverviewItems ここから
     * 店頭稼働では代理店・実稼働場所を一覧では省略
     ****************************************************/
    function renderOptionalOverviewItems(item, isRetailStore) {
      if (isRetailStore) {
        return '';
      }

      return `
        ${overviewItemHtml('代理店', item.agency_name || '-')}
        ${overviewItemHtml('実稼働場所', item.work_location || '-')}
      `;
    }
    /****************************************************
     * renderOptionalOverviewItems ここまで
     ****************************************************/


    /****************************************************
     * overviewItemHtml ここから
     ****************************************************/
    function overviewItemHtml(label, value, important) {
      const importantClass = important ? ' important' : '';

      return `
        <div class="overview-item${importantClass}">
          <span class="overview-label">${escapeHtml(label)}</span>
          <span class="overview-value">${escapeHtml(displayValue(value))}</span>
        </div>
      `;
    }
    /****************************************************
     * overviewItemHtml ここまで
     ****************************************************/


    /****************************************************
     * 表示整形 ここから
     ****************************************************/
    function formatCreatedAt(value) {
      if (!value) {
        return '登録日時：-';
      }

      return `登録：${value}`;
    }
    /****************************************************
     * 表示整形 ここまで
     ****************************************************/


    /****************************************************
     * API・検索条件 ここから
     ****************************************************/
    function getListFilters() {
      return {
        keyword: document.getElementById('keyword').value.trim(),
        target_month: document.getElementById('targetMonthFilter').value,
        status: document.getElementById('statusFilter').value,
        case_type: document.getElementById('caseTypeFilter').value
      };
    }

    function debounceLoadListPageData() {
      clearTimeout(searchTimer);

      searchTimer = setTimeout(() => {
        loadListPageData();
      }, 500);
    }
    /****************************************************
     * API・検索条件 ここまで
     ****************************************************/


    /****************************************************
     * 小物関数 ここから
     ****************************************************/
    function setMessage(text, type) {
      const box = document.getElementById('messageBox');
      box.textContent = text;
      box.className = `message ${type || ''}`;
    }
    /****************************************************
     * 小物関数 ここまで
     ****************************************************/
  </script>
</body>
</html>
